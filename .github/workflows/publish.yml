name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,all-tools]"

      - name: Lint
        run: |
          ruff check core/ cli/ server/
          ruff format --check core/ cli/ server/

      - name: Run unit tests
        run: |
          pytest tests/unit/ -x -q --timeout=30 -m "not live and not azure and not ollama" --cov=core --cov-report=term-missing --cov-report=xml --cov-fail-under=70

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Verify version matches release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag (manual run?); skipping version check"
            exit 0
          fi
          TAG_VERSION="${TAG#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PY_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject.toml=$PY_VERSION tag=$TAG_VERSION (raw tag=$TAG)"
            exit 1
          fi
          echo "Version OK: $PY_VERSION matches tag $TAG"

      - name: Build package
        run: python -m build

      - name: Verify wheel contents
        run: |
          WHEEL=$(ls dist/*.whl | head -n1)
          if [ -z "$WHEEL" ]; then
            echo "No wheel found in dist/"
            exit 1
          fi
          LISTING=$(python -m zipfile -l "$WHEEL")
          echo "$LISTING"
          echo "$LISTING" | grep -q 'templates/__init__.py' || {
            echo "Wheel missing templates/__init__.py"
            exit 1
          }
          echo "$LISTING" | grep -q 'server/static/index.html' || {
            echo "Wheel missing server/static/index.html"
            exit 1
          }
          echo "Wheel content check OK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
