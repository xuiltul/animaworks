<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Person - Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Digital Person</h1>
    <div class="person-selector">
      <select class="person-dropdown" id="personDropdown">
        <option value="" disabled selected>パーソンを選択...</option>
      </select>
    </div>
    <div class="system-status" id="systemStatus">
      <span class="status-dot status-idle"></span>
      <span id="systemStatusText">接続中...</span>
    </div>
  </header>

  <main class="app-layout">
    <!-- Main Panel: Chat -->
    <section class="panel panel-main">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">パーソンを選択してチャットを開始</div>
      </div>
      <form class="chat-input-form" id="chatForm">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="メッセージを入力... (Ctrl+Enter で送信)"
          autocomplete="off"
          rows="1"
          disabled
        ></textarea>
        <button type="submit" class="chat-send-btn" id="chatSendBtn" disabled>送信</button>
      </form>
    </section>

    <!-- Right Panel: State/Activity Tabs + Memory Browser -->
    <aside class="panel panel-right">
      <nav class="right-tabs">
        <button class="right-tab active" data-tab="state">現在の状態</button>
        <button class="right-tab" data-tab="activity">アクティビティ</button>
      </nav>
      <div class="right-tab-content" id="rightTabContent">
        <!-- State tab -->
        <div class="tab-pane active" id="tabState" data-tab="state">
          <pre class="state-content" id="personStateContent">パーソンを選択してください</pre>
        </div>
        <!-- Activity tab -->
        <div class="tab-pane" id="tabActivity" data-tab="activity">
          <div class="activity-feed" id="activityFeed">
            <div class="activity-empty">イベントを待機中...</div>
          </div>
        </div>
      </div>

      <section class="memory-browser">
        <nav class="memory-tabs">
          <button class="memory-tab active" data-tab="episodes">エピソード</button>
          <button class="memory-tab" data-tab="knowledge">知識</button>
          <button class="memory-tab" data-tab="procedures">手順書</button>
        </nav>
        <div class="memory-file-list" id="memoryFileList">
          <div class="loading-placeholder">パーソンを選択してください</div>
        </div>
        <div class="memory-content-area" id="memoryContentArea" style="display:none;">
          <button class="memory-back-btn" id="memoryBackBtn">&larr; 一覧に戻る</button>
          <h3 class="memory-content-title" id="memoryContentTitle"></h3>
          <pre class="memory-content-body" id="memoryContentBody"></pre>
        </div>
      </section>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
