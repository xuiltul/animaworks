<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AnimaWorks Workspace</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="style.css?v=20260302f">
  <link rel="stylesheet" href="/styles/voice.css">
  <link rel="icon" type="image/svg+xml" href="/shared/favicon.svg">
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.172.0",
      "three/addons/": "https://esm.sh/three@0.172.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ── Login Overlay ────────────────── -->
  <div id="wsLogin"></div>

  <!-- ── Dashboard ────────────────────── -->
  <div id="wsDashboard" class="hidden">

    <!-- Header -->
    <header class="ws-header">
      <div class="ws-header-left">
        <span class="ws-title">AnimaWorks</span>
        <span class="ws-subtitle">Workspace</span>
      </div>
      <div class="ws-header-center" id="wsAnimaSelector"></div>
      <div class="ws-header-right">
        <button class="ws-view-toggle" id="wsViewToggle" title="Toggle view" data-i18n-title="ws.view_toggle_title">
          <span class="ws-view-toggle-3d">🏢 3D</span>
          <span class="ws-view-toggle-org">📊 Dashboard</span>
        </button>
        <div class="ws-system-status" id="wsSystemStatus">
          <span class="status-dot status-offline"></span>
          <span class="status-text" data-i18n="ws.connecting">接続中...</span>
        </div>
        <span class="ws-user-info" id="wsUserInfo"></span>
        <button class="ws-logout-btn" id="wsLogoutBtn" data-i18n="ws.logout">Log out</button>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="ws-layout">

      <!-- 3D Office (always visible) -->
      <div class="ws-office-panel" id="wsOfficePanel">
        <div class="ws-office-canvas" id="wsOfficeCanvas"></div>
      </div>

      <!-- Org Dashboard (alternative to 3D) -->
      <div class="ws-org-panel hidden" id="wsOrgPanel"></div>

      <!-- Conversation Overlay (appears on top of office) -->
      <div class="ws-conv-overlay hidden" id="wsConvOverlay">
        <div class="ws-conv-layout" id="wsConvLayout">

          <!-- Left: Info Sidebar -->
          <aside class="ws-conv-sidebar">
            <!-- Tab Bar -->
            <div class="ws-right-tabs" id="wsRightTabs">
              <button class="right-tab active" data-tab="state" id="wsTabState" data-i18n="ws.state_tab">状態</button>
              <button class="right-tab" data-tab="activity" id="wsTabActivity" data-i18n="ws.activity_tab">活動</button>
              <button class="right-tab" data-tab="board" id="wsTabBoard" data-i18n="ws.board_tab">Board</button>
              <button class="right-tab" data-tab="history" id="wsTabHistory" data-i18n="ws.history_tab">履歴</button>
            </div>

            <!-- Tab Panes -->
            <div class="ws-right-panes">
              <div class="tab-pane" data-pane="state" id="wsPaneState"></div>
              <div class="tab-pane" data-pane="activity" id="wsPaneActivity" style="display:none"></div>
              <div class="tab-pane" data-pane="board" id="wsPaneBoard" style="display:none"></div>
              <div class="tab-pane" data-pane="history" id="wsPaneHistory" style="display:none"></div>
            </div>

            <!-- Memory Browser -->
            <div class="ws-memory-panel" id="wsMemoryPanel"></div>
            <button class="ws-mobile-memory-close" id="wsMobileMemoryClose" data-i18n-aria-label="common.aria_close">&times;</button>
          </aside>

          <!-- Mobile sidebar backdrop -->
          <div class="ws-conv-sidebar-backdrop" id="wsSidebarBackdrop"></div>

          <!-- Center: Chat -->
          <main class="ws-conv-main">
            <div class="ws-conv-header">
              <button class="ws-mobile-sidebar-toggle" id="wsMobileSidebarToggle" data-i18n-aria-label="common.aria_sidebar">&#9776;</button>
              <button class="ws-conv-back-btn" id="wsConvBack" data-i18n="ws.back_office">&larr; Back to office</button>
              <span class="ws-conv-anima-name" id="wsConvAnimaName"></span>
              <button class="ws-mobile-character-toggle" id="wsMobileCharacterToggle" data-i18n-aria-label="common.aria_character">&#128100;</button>
            </div>
            <div class="thread-tabs ws-thread-tabs" id="wsThreadTabs"></div>
            <div class="ws-conv-messages" id="wsConvMessages">
              <div class="chat-empty" data-i18n="ws.messages_empty">No messages yet</div>
            </div>
            <div class="ws-conv-input-area">
              <div class="image-preview-bar" id="wsConvPreviewBar" style="display:none"></div>
              <div class="pending-queue-bar" id="wsConvPending" style="display:none">
                <div class="pending-queue-header">
                  <span class="pending-queue-label" id="wsConvPendingLabel" data-i18n="chat.queue_label">キュー</span>
                  <button class="pending-queue-clear" id="wsConvPendingCancel" type="button" data-i18n-title="chat.queue_clear_all" title="全クリア">✕ all</button>
                </div>
                <div id="wsConvPendingList"></div>
              </div>
              <div class="chat-input-wrap">
                <textarea class="ws-conv-input" id="wsConvInput" data-i18n-placeholder="ws.message_placeholder" placeholder="メッセージを入力... (Ctrl+Enter, Alt+Enter でキュー)" rows="1"></textarea>
                <div class="chat-input-actions">
                  <button class="chat-attach-btn" type="button" id="wsConvAttachBtn" data-i18n-title="ws.attach_image" title="画像を添付">+</button>
                  <button class="chat-queue-btn" type="button" id="wsConvQueueBtn" data-i18n-title="chat.queue_add" title="キューに追加 (Alt+Enter)">
                    <svg class="chat-queue-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <path d="M12 5v14M5 12l7 7 7-7" />
                    </svg>
                  </button>
                  <button class="ws-conv-send" id="wsConvSend">
                    <svg class="chat-send-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <path d="M12 19V5M5 12l7-7 7 7" />
                    </svg>
                  </button>
                </div>
              </div>
              <input type="file" id="wsConvFileInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" />
            </div>
          </main>

          <!-- Right: Live2D Character -->
          <aside class="ws-conv-character">
            <canvas id="wsConvCanvas"></canvas>
          </aside>
        </div>
      </div>

    </div>

    <!-- ── Reveal Overlay (Anima Birth Animation) ── -->
    <div id="wsRevealOverlay" class="ws-reveal-overlay" aria-hidden="true">
      <div class="ws-reveal-flash"></div>
      <div class="ws-reveal-content">
        <img class="ws-reveal-avatar" id="wsRevealAvatar" alt="" />
        <div class="ws-reveal-text" id="wsRevealText"></div>
      </div>
    </div>

  </div>

  <script src="/vendor/lucide/lucide.min.js"></script>
  <!-- ── Module Entry Point ───────────── -->
  <script type="module" src="modules/app.js?v=20260227c"></script>
</body>
</html>
