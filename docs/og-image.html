<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1280px;
  height: 640px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

.container {
  width: 1280px;
  height: 640px;
  background: linear-gradient(135deg, #0a0e1a 0%, #0f1629 30%, #111d3a 60%, #0d1526 100%);
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* Subtle grid pattern */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(96, 165, 250, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(96, 165, 250, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Ambient glow behind the icon */
.ambient-glow {
  position: absolute;
  left: 200px;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(96, 165, 250, 0.12) 0%, rgba(96, 165, 250, 0.04) 35%, transparent 70%);
  pointer-events: none;
}

/* Secondary glow top-right */
.ambient-glow-2 {
  position: absolute;
  right: -100px;
  top: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(147, 197, 253, 0.06) 0%, transparent 60%);
  pointer-events: none;
}

.icon-area {
  flex-shrink: 0;
  width: 360px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 2;
}

.icon-area svg {
  width: 180px;
  height: 180px;
  filter: drop-shadow(0 0 40px rgba(96, 165, 250, 0.35))
          drop-shadow(0 0 80px rgba(96, 165, 250, 0.15));
}

.text-area {
  flex: 1;
  padding-right: 80px;
  position: relative;
  z-index: 2;
}

.title {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -1.5px;
  color: #f0f6ff;
  line-height: 1;
  margin-bottom: 20px;
  text-shadow: 0 0 60px rgba(96, 165, 250, 0.2);
}

.title span {
  color: #93c5fd;
}

.subtitle {
  font-size: 24px;
  font-weight: 400;
  color: rgba(148, 163, 184, 0.9);
  letter-spacing: 0.5px;
  line-height: 1.4;
}

.divider {
  width: 64px;
  height: 2px;
  background: linear-gradient(90deg, #60a5fa, rgba(96, 165, 250, 0.1));
  margin-bottom: 18px;
  border-radius: 1px;
}

.tags {
  display: flex;
  gap: 10px;
  margin-top: 28px;
}

.tag {
  font-size: 13px;
  font-weight: 500;
  color: rgba(147, 197, 253, 0.7);
  background: rgba(96, 165, 250, 0.08);
  border: 1px solid rgba(96, 165, 250, 0.15);
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

/* Floating particles */
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(147, 197, 253, 0.25);
  pointer-events: none;
}
.p1 { width: 3px; height: 3px; left: 80px; top: 120px; opacity: 0.4; }
.p2 { width: 2px; height: 2px; left: 320px; top: 80px; opacity: 0.3; }
.p3 { width: 4px; height: 4px; left: 150px; top: 480px; opacity: 0.2; }
.p4 { width: 2px; height: 2px; right: 200px; top: 150px; opacity: 0.35; }
.p5 { width: 3px; height: 3px; right: 350px; bottom: 120px; opacity: 0.25; }
.p6 { width: 2px; height: 2px; left: 500px; top: 60px; opacity: 0.3; }
.p7 { width: 3px; height: 3px; right: 100px; bottom: 200px; opacity: 0.2; }

/* Bottom subtle border */
.bottom-accent {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.3), rgba(147, 197, 253, 0.5), rgba(96, 165, 250, 0.3), transparent);
}
</style>
</head>
<body>
<div class="container">
  <div class="grid-overlay"></div>
  <div class="ambient-glow"></div>
  <div class="ambient-glow-2"></div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>

  <div class="icon-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
      <defs>
        <linearGradient id="outer" x1="0.3" y1="1" x2="0.6" y2="0">
          <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
          <stop offset="50%" stop-color="#93c5fd"/>
          <stop offset="100%" stop-color="#e0f2fe"/>
        </linearGradient>
        <linearGradient id="inner" x1="0.5" y1="1" x2="0.5" y2="0">
          <stop offset="0%" stop-color="#bfdbfe"/>
          <stop offset="100%" stop-color="#ffffff"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="0.8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path d="M15 27 C13 28, 10 29, 8 28.5 C6 28, 7 26.5, 9 26.5 C11 26.5, 13 27, 15 26" fill="url(#outer)" opacity="0.5"/>
      <path d="M17 3 C15 6, 12 8, 10 11 C8 14, 7 16, 7.5 19 C8 22, 9 24, 11 25.5 C13 27, 15 27.5, 17 27 C19 26.5, 21 25, 22.5 23 C24 21, 25 18, 24.5 15 C24 12, 22 9, 20 6 C19 4.5, 18 3.5, 17 3Z" fill="url(#outer)" opacity="0.8" filter="url(#glow)"/>
      <path d="M20 5 C21 7, 23 10, 23.5 8 C24 6, 21 4, 20 5Z" fill="#93c5fd" opacity="0.4"/>
      <path d="M16.5 11 C14.5 14, 12 17, 12.5 20 C13 22.5, 14.5 24, 16.5 24 C18.5 24, 20 22.5, 20.5 20 C21 17.5, 19 14, 17 11Z" fill="url(#inner)" opacity="0.9"/>
      <ellipse cx="15" cy="18" rx="1.5" ry="3" fill="white" opacity="0.45"/>
    </svg>
  </div>

  <div class="text-area">
    <div class="title">Anima<span>Works</span></div>
    <div class="divider"></div>
    <div class="subtitle">Organization-as-Code for<br>Autonomous AI Agents</div>
    <div class="tags">
      <span class="tag">Brain-Inspired Memory</span>
      <span class="tag">Multi-Model</span>
      <span class="tag">Self-Directed</span>
    </div>
  </div>

  <div class="bottom-accent"></div>
</div>
</body>
</html>
